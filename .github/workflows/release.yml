name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'
  # Manual dry-run: builds artifacts but skips the release/upload job.
  workflow_dispatch:

# Least-privilege default for all jobs; the release job widens this to
# `contents: write` for itself.
permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS — Apple Silicon (native on the arm64 runner)
          - os: macos-14
            target: aarch64-apple-darwin
            platform: aarch64-macos
            asset_name: quipu-aarch64-macos
            built_name: quipu

          # macOS — Intel (cross-compiled from the arm64 runner; the Apple
          # toolchain ships both arches, so no extra linker is needed)
          - os: macos-14
            target: x86_64-apple-darwin
            platform: x86_64-macos
            asset_name: quipu-x86_64-macos
            built_name: quipu

          # Linux — x86_64 (GNU)
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            platform: x86_64-linux
            asset_name: quipu-x86_64-linux
            built_name: quipu

          # Windows — x86_64 (MSVC)
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            platform: x86_64-windows
            asset_name: quipu-x86_64-windows.exe
            built_name: quipu.exe

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build quipu
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Rename artifact
        shell: bash
        run: |
          mv "target/${{ matrix.target }}/release/${{ matrix.built_name }}" "./${{ matrix.asset_name }}"

      - name: Upload artifact for release job
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.platform }}
          path: ./${{ matrix.asset_name }}

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    # Only publish a release for tag pushes (workflow_dispatch is a dry-run).
    if: startsWith(github.ref, 'refs/tags/')

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Verify Cargo.toml version matches the tag
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME#v}"
          cargo_version="$(grep -m1 -E '^version = ' Cargo.toml | sed -E 's/.*"([^"]+)".*/\1/')"
          if [ "$tag" != "$cargo_version" ]; then
            echo "::error::tag v$tag does not match Cargo.toml version $cargo_version" >&2
            exit 1
          fi
          echo "Cargo.toml version $cargo_version matches tag v$tag"

      - name: Download all build artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: List downloaded files
        run: ls -R artifacts

      - name: Create release and upload assets
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          files: artifacts/**/*
